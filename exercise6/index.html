<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h2>Petrol Calculator</h2>
        
        <div class="input-box">
            <label>Cost per liter (£)</label>
            <input type="number" id="cost" value="1.72" step="0.01">
        </div>

        <div class="input-box">
            <label>Liters purchased</label>
            <input type="number" id="liters" value="0">
        </div>

        <button id="calc-btn">Calculate Total</button>

        <div class="result-box">
            <p>Total Cost: <span id="total-text">£0.00</span></p>
        </div>
    </div>
    <script src="script.js"></script>
    </body>
</html>
