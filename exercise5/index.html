<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zerobaseone Good So Bad MV</title>
    <!-- Link to external CSS for styling the video layout -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main layout container for video + info + actions -->
    <div class="youtube-layout">

        <div class="video-container">
            <!-- Video element: plays local MP4 file -->
            <video class="local-video"
                   src="ZEROBASEONE (제로베이스원) 'GOOD SO BAD' MV.mp4" 
                   poster="goodsobadthumbnail.jpg"
                   loop
                   controls>
            </video>
            <!-- 
                poster="..." shows the thumbnail before playing
                loop makes video repeat automatically
                controls adds play/pause/volume UI
            -->
        </div>

        <div class="video-info">
            <!-- Title and metadata about the video -->
            <h1 class="video-title">ZEROBASEONE (제로베이스원) 'GOOD SO BAD' MV</h1>
            <div class="video-meta">
                <span>67,420 views • September 5, 2027</span>
                <span>Seok Matthew</span>
            </div>
        </div>

        <div class="video-actions">
            <!-- Buttons like YouTube for like, dislike, share, save -->
            <div class="action-button">
                <div class="action-icon"></div>
                Like
            </div>
            <div class="action-button">
                <div class="action-icon"></div>
                Dislike
            </div>
            <div class="action-button">
                <div class="action-icon"></div>
                Share
            </div>
            <div class="action-button">
                <div class="action-icon"></div>
                Save
            </div>
        </div>
    </div>
</body>
</html>
