<!DOCTYPE html>
<!-- HTML5 document type declaration -->
<html lang="en">
<head>
    <title>ZeroBaseone Three Images</title>
    <!-- Page title displayed in browser tab -->

    <link rel="stylesheet" href="seantographydesign.css">
    <!-- Link to external CSS for page styling -->
</head>
<body>

    <nav class="nav-bar">
        <!-- Navigation bar at the top of the page -->
        <div class="nav-container">
            <a href="seantography.html" class="active">My Photos</a>
            <!-- Active link highlighted to indicate current page -->
            <a href="stylingdivs3.html">Border Exercise</a>
        </div>
    </nav>

    <h1>ZeroBaseOne: Live on Stage</h1>
    <!-- Main heading/title of the page -->

    <div class="gallery-container">
        <!-- Container for the photo gallery -->

        <div class="photo-entry">
            <!-- Individual photo block -->
            <div class="frame frame-a">
                <!-- Frame div can be styled differently using CSS classes frame-a, frame-b, frame-c -->
                <img src="pictures/zerobaseonehanyujinstage.png" 
                     alt="Han Yujin crying in concert break" 
                     width="350" height="350" 
                     title="Yujin Center Stage">
                <!-- Image element with alt text for accessibility and title for tooltip -->
            </div>
            <p class="copyright">© 2026 Sean Lao. Original Photography.</p>
            <!-- Copyright notice for each photo -->
        </div>

        <div class="photo-entry">
            <div class="frame frame-b">
                <img src="pictures/zerobaseoneintrostageot9.png" 
                     alt="Zerobaseone OT9 Onstage Silhouette" 
                     width="350" height="350" 
                     title="Group Silhouette">
            </div>
            <p class="copyright">© 2026 Sean Lao. Original Photography.</p>
        </div>

        <div class="photo-entry">
            <div class="frame frame-c">
                <img src="pictures/zerobaseoneot9stage.png" 
                     alt="Full group on stage captured in Concert" 
                     width="350" height="350" 
                     title="Concert Finale">
            </div>
            <p class="copyright">© 2026 Sean Lao. Original Photography.</p>
        </div>

    </div>

</body>
</html>
